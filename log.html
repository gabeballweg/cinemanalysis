<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log a Movie</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:         #0f0f0f;
      --surface:    #1a1a1a;
      --surface2:   #222222;
      --border:     #2c2c2c;
      --text:       #e8e8e8;
      --text-muted: #a7a7a7;
      --highlight:  #e8e8e8;
    }

    body {
      background-color: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 48px 20px 32px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 600;
      color: var(--highlight);
    }

    .header-sub {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    input, select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 12px 16px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      border-color: var(--text-muted);
    }

    select option {
      background: var(--surface2);
    }

    /* ── AUTOCOMPLETE ─────────────────────────────────── */
    .autocomplete-wrap {
      position: relative;
    }

    .autocomplete-list {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 4px 4px;
      z-index: 100;
      max-height: 260px;
      overflow-y: auto;
    }

    .autocomplete-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .autocomplete-item:last-child {
      border-bottom: none;
    }

    .autocomplete-item:hover {
      background: var(--surface);
    }

    .autocomplete-title {
      font-size: 0.9rem;
      color: var(--text);
    }

    .autocomplete-year {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── METADATA PREVIEW ─────────────────────────────── */
    #movie-preview {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 20px;
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.8;
    }

    #movie-preview strong {
      color: var(--text);
    }

    /* ── SUBMIT ───────────────────────────────────────── */
    .submit-btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 14px 24px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 8px;
    }

    .submit-btn:hover {
      opacity: 0.85;
    }

    .submit-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    #status-msg {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-align: center;
      min-height: 20px;
    }

    #status-msg.success { color: #268a7a; }
    #status-msg.error   { color: #c04444; }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    footer a {
      color: var(--text-muted);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--text);
    }

    #password-gate input:focus {
    border-color: var(--text-muted);
    }

    input[type="date"] {
      min-width: 0;
      max-width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <!-- ── PASSWORD GATE ──────────────────────────────────────── -->
  <div id="password-gate" style="
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 9999;
    ">
      <p style="font-family:'Inter',sans-serif; font-size:0.7rem; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--text-muted);">Enter Password</p>
      <input type="password" id="password-input" style="
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font-family: 'Inter', sans-serif;
        font-size: 0.95rem;
        padding: 12px 16px;
        width: 280px;
        outline: none;
        text-align: center;
      " placeholder="Password" />
      <p id="password-error" style="font-family:'Inter',sans-serif; font-size:0.75rem; color:#c04444; display:none;">Incorrect password.</p>
    </div>
  <header>
    <h1>Log a Movie</h1>
    <p class="header-sub">Add a new entry to Cinemanalysis</p>
  </header>

  <main>

    <!-- MOVIE SEARCH -->
    <div class="field">
      <label>Movie Title</label>
      <div class="autocomplete-wrap">
        <input type="text" id="movie-search" placeholder="Start typing a title..." autocomplete="off" />
        <div class="autocomplete-list" id="autocomplete-list"></div>
      </div>
    </div>

    <!-- METADATA PREVIEW -->
    <div id="movie-preview"></div>

    <!-- HIDDEN FIELDS (auto-filled) -->
    <input type="hidden" id="field-title" />
    <input type="hidden" id="field-year" />
    <input type="hidden" id="field-director" />
    <input type="hidden" id="field-runtime" />
    <input type="hidden" id="field-genres" />
    <input type="hidden" id="field-actors" />
    <input type="hidden" id="field-tmdb-id" />
    <input type="hidden" id="field-poster-path" />

    <!-- DATE WATCHED -->
    <div class="field">
      <label>Date Watched</label>
      <input type="date" id="field-date" />
    </div>

    <!-- SOURCE -->
    <div class="field">
      <label>Source</label>
      <select id="field-source">
        <option value="" disabled selected>Select a source</option>
        <option>Library DVD Rental</option>
        <option>HBO Max</option>
        <option>Netflix</option>
        <option>Hulu</option>
        <option>Disney+</option>
        <option>Youtube</option>
        <option>Theater</option>
        <option>Airplane</option>
        <option>Google Play Rental</option>
        <option>Owned DVD</option>
      </select>
    </div>

    <!-- NEW OR REWATCH -->
    <div class="field">
      <label>New or Rewatch</label>
      <select id="field-rewatch">
        <option value="" disabled selected>Select one</option>
        <option value="New">New</option>
        <option value="Rewatch">Rewatch</option>
      </select>
    </div>

    <!-- RATING -->
    <div class="field">
      <label>Rating</label>
      <select id="field-rating">
        <option value="" disabled selected>Select a rating</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>8</option>
        <option>9</option>
        <option>10</option>
      </select>
    </div>

    <button class="submit-btn" id="submit-btn" disabled>Submit Entry</button>
    <div id="status-msg"></div>

  </main>

  <footer>
    <a href="index.html">← Back to Dashboard</a>
  </footer>

<script>
  // ── AUTH ─────────────────────────────────────────────────
  const PASSWORD = "royalewithcheese";

  document.getElementById('password-input').addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    if (this.value === PASSWORD) {
      const gate = document.getElementById('password-gate');
      gate.style.transition = 'opacity 0.3s';
      gate.style.opacity = '0';
      setTimeout(() => gate.remove(), 300);
    } else {
      document.getElementById('password-error').style.display = 'block';
      this.value = '';
      this.focus();
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('password-input').focus();
  });

  // ── CONFIG ──────────────────────────────────────────────
  const TMDB_TOKEN   = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJhOTUyOWFjOGQzMjNkMWU1NzMwMWQxOTNmNWJiMDllNCIsIm5iZiI6MTc3Mzc2NDg1NC4yMiwic3ViIjoiNjliOTgwZjY0OGEzZGU3YTU4MmM4Yzk3Iiwic2NvcGVzIjpbImFwaV9yZWFkIl0sInZlcnNpb24iOjF9.hwEoVAl5hAFMfKAlMZMc9GQlNPs1OrS-rUX3ZMZeE9o";
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_A4l-eQvDyb4PZIXIejaTfHp2Or8dtFfuiVilLL3HZc1pjSPtAALCarMBSxOnBC7j/exec";

  // ── AUTOCOMPLETE ─────────────────────────────────────────
  let searchTimeout = null;
  let selectedMovie = null;

  document.getElementById('movie-search').addEventListener('input', function () {
    clearTimeout(searchTimeout);
    const query = this.value.trim();
    if (query.length < 2) {
      hideList();
      return;
    }
    searchTimeout = setTimeout(() => searchMovies(query), 300);
  });

  async function searchMovies(query) {
    try {
      const res = await fetch(`https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(query)}&language=en-US&page=1`, {
        headers: { Authorization: `Bearer ${TMDB_TOKEN}` }
      });
      const data = await res.json();
      showList(data.results.slice(0, 8));
    } catch (e) {
      console.error('Search error:', e);
    }
  }

  function showList(results) {
    const list = document.getElementById('autocomplete-list');
    list.innerHTML = '';
    if (!results.length) {
      hideList();
      return;
    }
    results.forEach(movie => {
      const item = document.createElement('div');
      item.className = 'autocomplete-item';
      const year = movie.release_date ? movie.release_date.slice(0, 4) : '—';
      item.innerHTML = `
        <span class="autocomplete-title">${movie.title}</span>
        <span class="autocomplete-year">${year}</span>`;
      item.addEventListener('click', () => selectMovie(movie));
      list.appendChild(item);
    });
    list.style.display = 'block';
  }

  function hideList() {
    document.getElementById('autocomplete-list').style.display = 'none';
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.autocomplete-wrap')) hideList();
  });

  async function selectMovie(movie) {
    hideList();
    document.getElementById('movie-search').value = movie.title;
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('movie-preview').style.display = 'none';

    try {
      // Fetch full details including credits
      const [detailRes, creditsRes] = await Promise.all([
        fetch(`https://api.themoviedb.org/3/movie/${movie.id}?language=en-US`, {
          headers: { Authorization: `Bearer ${TMDB_TOKEN}` }
        }),
        fetch(`https://api.themoviedb.org/3/movie/${movie.id}/credits?language=en-US`, {
          headers: { Authorization: `Bearer ${TMDB_TOKEN}` }
        })
      ]);

      const detail  = await detailRes.json();
      const credits = await creditsRes.json();

      // Extract metadata
      const title    = detail.title;
      const year     = detail.release_date ? detail.release_date.slice(0, 4) : '';
      const runtime  = detail.runtime || '';
      const genres   = detail.genres.map(g => g.name).join(', ');
      const director = credits.crew.find(p => p.job === 'Director')?.name || '';
      const actors    = credits.cast.slice(0, 10).map(p => p.name).join(', ');

      // Populate hidden fields
      document.getElementById('field-title').value       = title;
      document.getElementById('field-year').value        = year;
      document.getElementById('field-director').value    = director;
      document.getElementById('field-runtime').value     = runtime;
      document.getElementById('field-genres').value      = genres;
      document.getElementById('field-actors').value      = actors;
      document.getElementById('field-tmdb-id').value     = movie.id;
      document.getElementById('field-poster-path').value = movie.poster_path || '';

      // Show preview
      const preview = document.getElementById('movie-preview');
      preview.innerHTML = `
        <strong>${title}</strong> (${year})<br>
        Director: ${director || '—'}<br>
        Runtime: ${runtime ? runtime + ' min' : '—'}<br>
        Genres: ${genres || '—'}<br>
        Actors: ${actors || '—'}`;
      preview.style.display = 'block';

      selectedMovie = movie;
      document.getElementById('submit-btn').disabled = false;

    } catch (e) {
      console.error('Detail fetch error:', e);
    }
  }

  // ── SUBMIT ───────────────────────────────────────────────
  document.getElementById('submit-btn').addEventListener('click', async () => {
    const btn    = document.getElementById('submit-btn');
    const status = document.getElementById('status-msg');

    const payload = {
      title:       document.getElementById('field-title').value,
      year:        document.getElementById('field-year').value,
      director:    document.getElementById('field-director').value,
      runtime:     document.getElementById('field-runtime').value,
      genres:      document.getElementById('field-genres').value,
      actors:      document.getElementById('field-actors').value,
      dateWatched: document.getElementById('field-date').value,
      source:      document.getElementById('field-source').value,
      rewatch:     document.getElementById('field-rewatch').value,
      rating:      document.getElementById('field-rating').value,
      posterPath:  document.getElementById('field-poster-path').value
    };

    // Basic validation
    if (!payload.dateWatched || !payload.source || !payload.rewatch || !payload.rating) {
      status.textContent = 'Please fill in all fields before submitting.';
      status.className = 'error';
      return;
    }

    btn.disabled = true;
    status.textContent = 'Submitting...';
    status.className = '';

    try {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload),
        redirect: 'follow',
        mode: 'no-cors'
      });
      status.textContent = '✓ Entry logged successfully.';
      status.className = 'success';
      resetForm();
    } catch (e) {
      status.textContent = 'Something went wrong. Please try again.';
      status.className = 'error';
      btn.disabled = false;
    }
  });

  function resetForm() {
    document.getElementById('movie-search').value  = '';
    document.getElementById('field-date').value    = '';
    document.getElementById('field-source').value  = '';
    document.getElementById('field-rewatch').value = '';
    document.getElementById('field-rating').value  = '';
    document.getElementById('movie-preview').style.display = 'none';
    document.getElementById('submit-btn').disabled = true;
    selectedMovie = null;
  }
</script>
</body>
</html>
