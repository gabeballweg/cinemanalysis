<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cinemanalysis — Recommendations</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:         #0f0f0f;
      --surface:    #1a1a1a;
      --surface2:   #222222;
      --border:     #2c2c2c;
      --text:       #e8e8e8;
      --text-muted: #a7a7a7;
      --highlight:  #e8e8e8;
    }

    body {
      background-color: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 64px 20px 48px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 600;
      color: var(--highlight);
      letter-spacing: -0.1em;
      line-height: 1.1;
    }

    .header-sub {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-top: 18px;
      text-transform: uppercase;
    }

    main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    /* ── CONTROLS ─────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .controls-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 600px;
    }

    .refresh-btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 12px 24px;
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .refresh-btn:hover { opacity: 0.85; }
    .refresh-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── LOADING ──────────────────────────────────────── */
    #loading {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--text-muted);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RECOMMENDATION GRID ──────────────────────────── */
    #rec-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .rec-card {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }

    .rec-card:hover { background: var(--surface2); }

    .rec-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }

    .rec-poster-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border);
      font-size: 2rem;
    }

    .rec-info {
      padding: 14px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .rec-title {
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .rec-year {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .rec-reason {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 6px;
      font-style: italic;
      line-height: 1.4;
    }

    /* ── FOOTER ───────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    footer a {
      color: var(--text-muted);
      text-decoration: none;
    }

    footer a:hover { color: var(--text); }

    @media (max-width: 600px) {
      #rec-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <header>
    <h1>Cinemanalysis Recommender</h1>
  </header>

  <main>
    <div class="controls">
      <p class="controls-label">
        Recommendations are based on your highest rated films (8+), your top directors and genres, and the decades you rate most highly. Films you've already logged are excluded - new movies only.
      </p>
      <button class="refresh-btn" id="refresh-btn">Refresh</button>
    </div>

    <div id="loading"><div class="spinner"></div><br>Finding films…</div>
    <div id="rec-grid"></div>
  </main>

  <footer>
    <a href="index.html">← Back to Dashboard</a>
  </footer>

<script>
  // ── CONFIG ───────────────────────────────────────────────
  const TMDB_TOKEN    = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJhOTUyOWFjOGQzMjNkMWU1NzMwMWQxOTNmNWJiMDllNCIsIm5iZiI6MTc3Mzc2NDg1NC4yMiwic3ViIjoiNjliOTgwZjY0OGEzZGU3YTU4MmM4Yzk3Iiwic2NvcGVzIjpbImFwaV9yZWFkIl0sInZlcnNpb24iOjF9.hwEoVAl5hAFMfKAlMZMc9GQlNPs1OrS-rUX3ZMZeE9o";
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRdPMDM_QnyJp9fDZuITxCm2REcl-o0JrPfUuw38E0WmcSuT2KW0x5Ow2gs3SGCcXTKR7SDvEr3GKiz/pub?gid=629117052&single=true&output=csv";

  const COL = {
    title:        "Movie Title",
    newOrRewatch: "New or Rewatch",
    year:         "Release Year",
    director:     "Director",
    genres:       "Genres (Letterboxd)",
    rating:       "Rating"
  };

  // TMDB genre name → ID mapping
  const TMDB_GENRE_IDS = {
    "Action": 28, "Adventure": 12, "Animation": 16, "Comedy": 35,
    "Crime": 80, "Documentary": 99, "Drama": 18, "Family": 10751,
    "Fantasy": 14, "History": 36, "Horror": 27, "Music": 10402,
    "Mystery": 9648, "Romance": 10749, "Science Fiction": 878,
    "TV Movie": 10770, "Thriller": 53, "War": 10752, "Western": 37
  };

  // ── FETCH SHEET DATA ─────────────────────────────────────
  async function fetchSheetData() {
    return new Promise((resolve, reject) => {
      Papa.parse(SHEET_CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: res => resolve(res.data),
        error: reject
      });
    });
  }

  // ── ANALYZE PREFERENCES ──────────────────────────────────
  function analyzePreferences(rows) {
    const watched = new Set(rows.map(r => r[COL.title]).filter(Boolean).map(t => t.toLowerCase().trim()));

    const rated = rows.filter(r => r[COL.rating] && !isNaN(parseFloat(r[COL.rating])));

    // Top rated film IDs via search — collect titles rated 8+
    const highRatedTitles = rated
      .filter(r => parseFloat(r[COL.rating]) >= 8)
      .sort((a, b) => parseFloat(b[COL.rating]) - parseFloat(a[COL.rating]))
      .slice(0, 5)
      .map(r => r[COL.title]);

    // Top directors by average rating (min 2 films)
    const directorMap = {};
    rated.forEach(r => {
      const d = r[COL.director];
      if (!d) return;
      if (!directorMap[d]) directorMap[d] = { total: 0, count: 0 };
      directorMap[d].total += parseFloat(r[COL.rating]);
      directorMap[d].count++;
    });
    const topDirectors = Object.entries(directorMap)
      .filter(([, v]) => v.count >= 2)
      .map(([name, v]) => ({ name, avg: v.total / v.count }))
      .sort((a, b) => b.avg - a.avg)
      .slice(0, 3)
      .map(d => d.name);

    // Top genres by average rating (min 3 appearances)
    const genreMap = {};
    rated.forEach(r => {
      (r[COL.genres] || '').split(',').map(g => g.trim()).filter(Boolean).forEach(g => {
        if (!genreMap[g]) genreMap[g] = { total: 0, count: 0 };
        genreMap[g].total += parseFloat(r[COL.rating]);
        genreMap[g].count++;
      });
    });
    const topGenres = Object.entries(genreMap)
      .filter(([, v]) => v.count >= 3)
      .map(([name, v]) => ({ name, avg: v.total / v.count }))
      .sort((a, b) => b.avg - a.avg)
      .slice(0, 3)
      .map(g => g.name);

    // Top decades by average rating (min 3 films)
    const decadeMap = {};
    rated.forEach(r => {
      const yr = parseInt(r[COL.year]);
      if (!yr) return;
      const decade = Math.floor(yr / 10) * 10;
      if (!decadeMap[decade]) decadeMap[decade] = { total: 0, count: 0 };
      decadeMap[decade].total += parseFloat(r[COL.rating]);
      decadeMap[decade].count++;
    });
    const topDecades = Object.entries(decadeMap)
      .filter(([, v]) => v.count >= 3)
      .map(([decade, v]) => ({ decade: parseInt(decade), avg: v.total / v.count }))
      .sort((a, b) => b.avg - a.avg)
      .slice(0, 2)
      .map(d => d.decade);

    return { watched, highRatedTitles, topDirectors, topGenres, topDecades };
  }

  // ── TMDB HELPERS ─────────────────────────────────────────
  async function tmdbFetch(path) {
    const res = await fetch(`https://api.themoviedb.org/3${path}`, {
      headers: { Authorization: `Bearer ${TMDB_TOKEN}` }
    });
    return res.json();
  }

  async function searchMovieId(title) {
    const data = await tmdbFetch(`/search/movie?query=${encodeURIComponent(title)}&language=en-US&page=1`);
    return data.results?.[0]?.id || null;
  }

  async function getRecommendationsForMovie(id) {
    const data = await tmdbFetch(`/movie/${id}/recommendations?language=en-US&page=1`);
    return data.results || [];
  }

  async function discoverByGenreAndDecade(genreId, decade) {
    const data = await tmdbFetch(
      `/discover/movie?with_genres=${genreId}&primary_release_date.gte=${decade}-01-01&primary_release_date.lte=${decade + 9}-12-31&sort_by=vote_average.desc&vote_count.gte=100&language=en-US&page=1`
    );
    return data.results || [];
  }

  async function discoverByGenre(genreId) {
    const data = await tmdbFetch(
      `/discover/movie?with_genres=${genreId}&sort_by=vote_average.desc&vote_count.gte=200&language=en-US&page=1`
    );
    return data.results || [];
  }

  // ── BUILD RECOMMENDATIONS ─────────────────────────────────
  async function buildRecommendations() {
    const grid    = document.getElementById('rec-grid');
    const loading = document.getElementById('loading');
    const btn     = document.getElementById('refresh-btn');

    grid.innerHTML = '';
    loading.style.display = 'block';
    btn.disabled = true;

    try {
      const rows = await fetchSheetData();
      const { watched, highRatedTitles, topDirectors, topGenres, topDecades } = analyzePreferences(rows);

      const candidates = new Map(); // id → {movie, reason}

      // 1. Recommendations based on high-rated films
      for (const title of highRatedTitles) {
        const id = await searchMovieId(title);
        if (!id) continue;
        const recs = await getRecommendationsForMovie(id);
        recs.slice(0, 5).forEach(m => {
          if (!candidates.has(m.id)) {
            candidates.set(m.id, { movie: m, reason: `Because you liked ${title}` });
          }
        });
      }

      // 2. Discover by top genres
      for (const genre of topGenres) {
        const genreId = TMDB_GENRE_IDS[genre];
        if (!genreId) continue;
        const results = await discoverByGenre(genreId);
        results.slice(0, 4).forEach(m => {
          if (!candidates.has(m.id)) {
            candidates.set(m.id, { movie: m, reason: `Top ${genre} films` });
          }
        });
      }

      // 3. Discover by top genres in top decades
      for (const decade of topDecades) {
        for (const genre of topGenres.slice(0, 2)) {
          const genreId = TMDB_GENRE_IDS[genre];
          if (!genreId) continue;
          const results = await discoverByGenreAndDecade(genreId, decade);
          results.slice(0, 3).forEach(m => {
            if (!candidates.has(m.id)) {
              candidates.set(m.id, { movie: m, reason: `${genre} from the ${decade}s` });
            }
          });
        }
      }

      // Filter out already watched, shuffle, take 10
      const filtered = [...candidates.values()]
        .filter(({ movie }) => {
          const t = (movie.title || '').toLowerCase().trim();
          return !watched.has(t);
        });

      // Shuffle
      for (let i = filtered.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
      }

      const picks = filtered.slice(0, 12);

      loading.style.display = 'none';

      if (picks.length === 0) {
        grid.innerHTML = '<p style="padding:28px; color:var(--text-muted); font-size:0.85rem;">No recommendations found. Try logging more films with ratings.</p>';
        return;
      }

      picks.forEach(({ movie, reason }) => {
        const year = movie.release_date ? movie.release_date.slice(0, 4) : '—';
        const posterUrl = movie.poster_path
          ? `https://image.tmdb.org/t/p/w300${movie.poster_path}`
          : null;
        const tmdbUrl = `https://www.themoviedb.org/movie/${movie.id}`;

        const card = document.createElement('a');
        card.className = 'rec-card';
        card.href = tmdbUrl;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';

        card.innerHTML = posterUrl
          ? `<img class="rec-poster" src="${posterUrl}" alt="${movie.title}" loading="lazy" />`
          : `<div class="rec-poster-placeholder">🎬</div>`;

        card.innerHTML += `
          <div class="rec-info">
            <div class="rec-title">${movie.title}</div>
            <div class="rec-year">${year}</div>
            <div class="rec-reason">${reason}</div>
          </div>`;

        grid.appendChild(card);
      });

    } catch (err) {
      loading.style.display = 'none';
      grid.innerHTML = '<p style="padding:28px; color:var(--text-muted); font-size:0.85rem;">Something went wrong loading recommendations. Please try again.</p>';
      console.error(err);
    }

    btn.disabled = false;
  }

  // ── INIT ─────────────────────────────────────────────────
  document.getElementById('refresh-btn').addEventListener('click', buildRecommendations);

  // Load PapaParse then kick off
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js';
  script.onload = buildRecommendations;
  document.head.appendChild(script);
</script>
</body>
</html>
